<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>阿喵喵表情包分享</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">

    <div id="pagination" class="inline-pagination"></div>
    <button id="disclaimerBtn" class="note-btn" aria-label="免责声明">免责声明</button>
     <button id="darkToggle" class="dark-toggle" aria-label="切换深色模式" aria-pressed="false">🌙</button>
    </div>
  </div>
</header>

<main>
